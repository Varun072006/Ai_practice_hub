version: "3.9"

services:

  # ---------------- FRONTEND ----------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: practice-hub-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - practice-hub-net

  # ---------------- BACKEND ----------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: practice-hub-backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "mysql://h5q6pohuKN2GBRF.root:RHGiEhQLB6Kqq4gY@gateway01.ap-southeast-1.prod.aws.tidbcloud.com:4000/test"
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
      JUDGE0_API_URL: http://judge0-server:2358
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      - judge0-server
    restart: unless-stopped
    networks:
      - practice-hub-net

  # ---------------- MYSQL (OPTIONAL) ----------------
  mysql:
    image: mysql:8.0
    container_name: practice-hub-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: practicehub123
      MYSQL_DATABASE: practice_hub
      MYSQL_USER: practicehub
      MYSQL_PASSWORD: practicehub123
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - practice-hub-net

  # ---------------- CHROMADB ----------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: practice-hub-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped
    networks:
      - practice-hub-net

  # ---------------- JUDGE0 SERVER ----------------
  judge0-server:
    image: judge0/judge0:1.13.1
    container_name: judge0-server
    privileged: true
    ports:
      - "2358:2358"
    environment:
      REDIS_HOST: judge0-redis
      REDIS_PASSWORD: judge0redis
      POSTGRES_HOST: judge0-db
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0db
      POSTGRES_DB: judge0
      JUDGE0_USE_ISOLATE: ""
      DISABLE_RESOURCE_LIMITS: "true"
      MAX_CPU_TIME_LIMIT: "30"
      MAX_WALL_TIME_LIMIT: "60"
      MAX_MEMORY_LIMIT: "4194304"
      MEMORY_LIMIT: "512000"
    volumes:
      - ./isolate_job.rb:/api/app/jobs/isolate_job.rb
    depends_on:
      - judge0-db
      - judge0-redis
    restart: always
    networks:
      - practice-hub-net

  # ---------------- JUDGE0 WORKER ----------------
  judge0-worker:
    # Build custom image with Node.js added to 1.13.1-extra
    # build:
    #   context: .
    #   dockerfile: judge0.Dockerfile
    image: judge0/judge0:1.13.1
    container_name: judge0-worker
    privileged: true
    # cgroup: host <--- Removing this as it might conflict with v2
    command: ["./scripts/workers"]

    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - judge0_box:/box
      - ./isolate_job.rb:/api/app/jobs/isolate_job.rb

    environment:
      REDIS_HOST: judge0-redis
      REDIS_PASSWORD: judge0redis
      POSTGRES_HOST: judge0-db
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0db
      POSTGRES_DB: judge0
      JUDGE0_USE_ISOLATE: ""
      DISABLE_RESOURCE_LIMITS: "true"
      MAX_CPU_TIME_LIMIT: "30"
      MAX_WALL_TIME_LIMIT: "60"
      MAX_MEMORY_LIMIT: "4194304"
      MEMORY_LIMIT: "512000"
      RAILS_LOG_TO_STDOUT: "true"

    depends_on:
      - judge0-db
      - judge0-redis
    restart: always
    networks:
      - practice-hub-net

  # ---------------- JUDGE0 POSTGRES ----------------
  judge0-db:
    image: postgres:13
    container_name: judge0-db
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0db
      POSTGRES_DB: judge0
    volumes:
      - judge0_postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - practice-hub-net

  # ---------------- JUDGE0 REDIS ----------------
  judge0-redis:
    image: redis:6
    container_name: judge0-redis
    command: ["redis-server", "--requirepass", "judge0redis"]
    volumes:
      - judge0_redis_data:/data
    restart: always
    networks:
      - practice-hub-net

# ---------------- NETWORK ----------------
networks:
  practice-hub-net:
    driver: bridge

# ---------------- VOLUMES ----------------
volumes:
  mysql_data:
  chroma_data:
  judge0_postgres_data:
  judge0_redis_data:
  judge0_box:
