version: '3.8'

services:

  # ---------------- FRONTEND ----------------
  frontend:
    image: varun072006/practice_hub_frontend:v1.0.3
    container_name: practice-hub-frontend-prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    networks:
      - practice-hub-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------- BACKEND ----------------
  backend:
    image: varun072006/practice_hub_backend:v1.0.3
    container_name: practice-hub-backend-prod
    expose:
      - "5000"
    environment:
      DATABASE_URL: mysql://practicehub:${MYSQL_PASSWORD}@mysql:3306/practice_hub
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
      JUDGE0_API_URL: http://judge0-server:2358
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-https://pcdp.bitsathy.ac.in/aipracticehub}
      ASSETS_STORAGE_PATH: /app/assets
    volumes:
      - assets_data:/app/assets
    depends_on:
      mysql:
        condition: service_healthy
      judge0-server:
        condition: service_started
    restart: always
    networks:
      - practice-hub-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------- MYSQL ----------------
  mysql:
    image: varun072006/practice_hub_mysql:v1.0.3
    container_name: practice-hub-mysql-prod
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: practice_hub
      MYSQL_USER: practicehub
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_prod_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always
    networks:
      - practice-hub-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------- JUDGE0 SERVER ----------------
  judge0-server:
    image: judge0/judge0:1.13.1
    container_name: judge0-server-prod
    privileged: true
    expose:
      - "2358"
    environment:
      REDIS_HOST: judge0-redis
      REDIS_PASSWORD: ${JUDGE0_REDIS_PASSWORD}
      POSTGRES_HOST: judge0-db
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD}
      POSTGRES_DB: judge0
      JUDGE0_USE_ISOLATE: ""
      DISABLE_RESOURCE_LIMITS: "true"
      MAX_CPU_TIME_LIMIT: "30"
      MAX_WALL_TIME_LIMIT: "60"
      MAX_MEMORY_LIMIT: "4194304"
      MEMORY_LIMIT: "512000"
    depends_on:
      - judge0-db
      - judge0-redis
    restart: always
    networks:
      - practice-hub-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------- JUDGE0 WORKER ----------------
  judge0-worker:
    # Use standard judge0 worker instead of building custom one assuming the host has the language plugins if needed, or pre-build later if custom.
    image: judge0/judge0:1.13.1
    container_name: judge0-worker-prod
    command: [ "./scripts/workers" ]
    privileged: true
    environment:
      REDIS_HOST: judge0-redis
      REDIS_PASSWORD: ${JUDGE0_REDIS_PASSWORD}
      POSTGRES_HOST: judge0-db
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD}
      POSTGRES_DB: judge0
      JUDGE0_USE_ISOLATE: ""
      DISABLE_RESOURCE_LIMITS: "true"
    depends_on:
      - judge0-db
      - judge0-redis
    restart: always
    networks:
      - practice-hub-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------- JUDGE0 DATABASE ----------------
  judge0-db:
    image: postgres:15
    container_name: judge0-db-prod
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD}
      POSTGRES_DB: judge0
    volumes:
      - judge0_prod_db_data:/var/lib/postgresql/data/
    restart: always
    networks:
      - practice-hub-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------- JUDGE0 REDIS ----------------
  judge0-redis:
    image: redis:7.0.14
    container_name: judge0-redis-prod
    command: [ "--requirepass", "${JUDGE0_REDIS_PASSWORD}" ]
    volumes:
      - judge0_prod_redis_data:/data
    restart: always
    networks:
      - practice-hub-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_prod_data:
  judge0_prod_db_data:
  judge0_prod_redis_data:
  assets_data:


networks:
  practice-hub-net:
    driver: bridge
