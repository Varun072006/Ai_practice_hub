server {
    listen 80;
    server_name localhost;

    include /etc/nginx/mime.types;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # ================= STATIC ASSETS =================
    # Handle asset requests both with and without the /aiportal/aipracticehub/ prefix.
    # The portal nginx MAY strip the prefix before forwarding, so we handle both cases.

    # Case 1: Requests arrive WITH the prefix (browser sends full path from index.html)
    location ^~ /aiportal/aipracticehub/assets/ {
        rewrite ^/aiportal/aipracticehub/(.*)$ /$1 break;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Nginx-Asset "prefixed" always;
    }

    # Case 2: Requests arrive WITHOUT the prefix (portal already stripped it)
    location ^~ /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Nginx-Asset "direct" always;
    }

    # ================= API PROXY =================
    # Proxy API requests to the backend service (must be BEFORE SPA catch-all)
    location ^~ /aiportal/aipracticehub/api/ {
        rewrite ^/aiportal/aipracticehub/api/(.*)$ /api/$1 break;
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    location ^~ /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ================= SPA ROUTING =================
    # Handle SPA routes with the subpath prefix
    location /aiportal/aipracticehub/ {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Nginx-Matched "subpath" always;
    }

    # Root location fallback for SPA routing (when prefix is stripped)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Nginx-Matched "root" always;
    }

    # Health check
    location = /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
